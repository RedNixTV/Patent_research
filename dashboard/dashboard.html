<!DOCTYPE html>

<html>

	<head>
		<title>
			Classification Discovery Tool
		</title>
	</head>
	
		<body>
			<div id="histogramControls">
			
				<label>
					<input
						type="checkbox"
						id="showFullClasses"
						checked
					>
					Show Full Classes
				</label>
			
			</div>
		
			<div id="summary"></div>
			
			<button id="referencesTab">
				References
			</button>
			
			<button id="cpcTab">
				CPC Histogram
			</button>
			
			<button id="uspcTab">
				USPC Histogram
			</button>
			
			<div id="content"></div>
			
				<pre id="histogramOutput"></pre>
				<div id="tableContainer">
					<table id="patentTable">
					
						<thead>
							<tr id="headerRow"></tr>
						</thead>
					
						<tbody></tbody>
					
					</table>	
				</div>
				<style>
				
				#tableContainer {
				
					overflow-x: auto;
				
					width: 100%;
				}
				
				#patentTable {
				
					table-layout: fixed;
					border-collapse: collapse;
					width: auto;
				}
				
				#patentTable th,
				#patentTable td {
				
					padding: 4px 8px;
					white-space: nowrap;
					overflow: hidden;
					text-overflow: ellipsis;
				}
				#patentTable th:nth-child(1),
				#patentTable td:nth-child(1) {
					width: 60px;
				}
				
				#patentTable th:nth-child(2),
				#patentTable td:nth-child(2) {
					width: 120px;
				}
				
				#patentTable th:nth-child(3),
				#patentTable td:nth-child(3) {
					width: 300px;
				}
				
				#patentTable th:nth-child(4),
				#patentTable td:nth-child(4) {
					width: 350px;
				}
				
				#patentTable th:nth-child(5),
				#patentTable td:nth-child(5) {
					width: 180px;
				}
				
				#patentTable th:nth-child(6),
				#patentTable td:nth-child(6) {
					width: 220px;
				}
				
				#patentTable th:nth-child(7),
				#patentTable td:nth-child(7) {
					width: 140px;
				}
				
				#patentTable th:nth-child(8),
				#patentTable td:nth-child(8),
				#patentTable th:nth-child(9),
				#patentTable td:nth-child(9) {
					width: 120px;
				}
				
				#patentTable th:nth-child(10),
				#patentTable td:nth-child(10) {
					width: 120px;
				}
				
				#patentTable th:nth-child(11),
				#patentTable td:nth-child(11) {
					width: 220px;
				}
				
				#patentTable th:nth-child(12),
				#patentTable td:nth-child(12) {
					width: 100px;
				}
				
				</style>
			<div
				id="editPatentDialog"
				style="
					display:none;
					position:fixed;
					top:50%;
					left:50%;
					transform:translate(-50%,-50%);
					background:white;
					border:1px solid #ccc;
					padding:20px;
					z-index:999999;
					width:600px;
				"
			>
			
				<h3>Edit Patent</h3>
			
				<label>Patent Number</label>
				<input
					id="editPatentNumber"
					style="width:100%;"
				>
			
				<br><br>
			
				<label>Title</label>
				<input
					id="editTitle"
					style="width:100%;"
				>
			
				<br><br>
			
				<label>Relevance</label>
			
				<select id="editRelevance">
			
					<option value="strong">
						Strong
					</option>
			
					<option value="partial">
						Partial
					</option>
			
					<option value="weak">
						Weak
					</option>
			
				</select>
			
				<br><br>
			
				<label>Assignee</label>
			
				<input
					id="editAssignee"
					style="width:100%;"
				>
			
				<br><br>
				
				<label>Application Number</label>
						<input
							id="editApplicationNumber"
							style="width:100%;"
							readonly
						>
						
						<br><br>
						
						<label>Filing Date</label>
						<input
							id="editFilingDate"
							style="width:100%;"
							readonly
						>
						
						<br><br>
						
						<label>Publication Date</label>
						<input
							id="editPublicationDate"
							style="width:100%;"
							readonly
						>
			
				<label>URL</label>
			
				<input
					id="editUrl"
					style="width:100%;"
					readonly
				>
			
				<br><br>
				<label>CPC</label>
				
				<textarea
					id="editCpc"
					style="
						width:100%;
						height:120px;
					"
					readonly
				></textarea>
				
				<br><br>
				
				<label>USPC</label>
				
				<textarea
					id="editUspc"
					style="
						width:100%;
						height:80px;
					"
					readonly
				></textarea>
				
				<br><br>
			
				<button id="savePatentChanges">
					Save Changes
				</button>
			
				<button id="deletePatentRecord">
					Delete Patent
				</button>
			
				<button id="cancelPatentEdit">
					Cancel
				</button>
			
			</div>	
		
			<script
				type="module"
				src="dashboard.js">
			</script>
		
		</body>

</html>
