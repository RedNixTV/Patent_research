<!DOCTYPE html>

<html>

	<head>
		<title>
			Classification Discovery Tool
		</title>
	</head>
	
		<body>
			<div id="histogramControls">
			
				<label>
					<input
						type="checkbox"
						id="showFullClasses"
						checked
					>
					Show Full Classes
				</label>
			
			</div>
		
			<div id="summary"></div>
			
			<div id="projectBar">
			
				<select id="projectSelector">
				</select>
			
				<button id="newProject">
					New Project
				</button>
			
				<button id="deleteProject">
					Delete Project
				</button>
			
			</div>
			
			<button id="referencesTab">
				References
			</button>
			
			<button id="cpcTab">
				CPC Histogram
			</button>
			
			<button id="uspcTab">
				USPC Histogram
			</button>
			
			<div id="content"></div>
			
				<button id="clearClassificationFilter">
					Show All References
				</button>
			
				<div id="histogramOutput"></div>
				<div id="tableContainer">
					<table id="patentTable">
					
						<thead>
							<tr id="headerRow"></tr>
						</thead>
					
						<tbody></tbody>
					
					</table>	
				</div>
				<style>
				.histogramBarText {
				
					display:inline-block;
				
					width:20ch;
				
					font-family:monospace;
				
					white-space:nowrap;
				}
				
				.histogramRow {
				
					display:flex;
					align-items:center;
					gap:10px;
					margin:4px 0;
				
					font-family:monospace;
				}
				
				.histogramCode {
				
					width:140px;
					flex-shrink:0;
				}
				
				.histogramCount {
				
					width:30px;
					text-align:right;
				}
				
				.histogramRefs {
				
					white-space:nowrap;
				}
				
				#tableContainer {
				
					overflow-x: auto;
				
					width: 100%;
				}
				
				#patentTable {
				
					table-layout: fixed;
					border-collapse: collapse;
					width: auto;
				}
				
				#patentTable th,
				#patentTable td {
				
					padding: 4px 8px;
					white-space: nowrap;
					overflow: hidden;
					text-overflow: ellipsis;
				}
				#patentTable th:nth-child(1),
				#patentTable td:nth-child(1) {
					width: 60px;
				}
				
				#patentTable th:nth-child(2),
				#patentTable td:nth-child(2) {
					width: 120px;
				}
				
				#patentTable th:nth-child(3),
				#patentTable td:nth-child(3) {
					width: 300px;
				}
				
				#patentTable th:nth-child(4),
				#patentTable td:nth-child(4) {
					width: 350px;
				}
				
				#patentTable th:nth-child(5),
				#patentTable td:nth-child(5) {
					width: 180px;
				}
				
				#patentTable th:nth-child(6),
				#patentTable td:nth-child(6) {
					width: 220px;
				}
				
				#patentTable th:nth-child(7),
				#patentTable td:nth-child(7) {
					width: 140px;
				}
				
				#patentTable th:nth-child(8),
				#patentTable td:nth-child(8),
				#patentTable th:nth-child(9),
				#patentTable td:nth-child(9) {
					width: 120px;
				}
				
				#patentTable th:nth-child(10),
				#patentTable td:nth-child(10) {
					width: 120px;
				}
				
				#patentTable th:nth-child(11),
				#patentTable td:nth-child(11) {
					width: 220px;
				}
				
				#patentTable th:nth-child(12),
				#patentTable td:nth-child(12) {
					width: 100px;
				}
				
				</style>
			<div
				id="editPatentDialog"
				style="
					display:none;
					position:fixed;
					top:50%;
					left:50%;
					transform:translate(-50%,-50%);
					background:white;
					border:1px solid #ccc;
					padding:20px;
					z-index:999999;
					width:700px;
			
					max-height:90vh;
					overflow-y:auto;
			
					box-sizing:border-box;
				"
			>
			
				<h3>Edit Patent</h3>
				
				<div id="editPatentFields"></div>
			
				<button id="savePatentChanges">
					Save Changes
				</button>
			
				<button id="deletePatentRecord">
					Delete Patent
				</button>
			
				<button id="cancelPatentEdit">
					Cancel
				</button>
			
			</div>	
		
			<script
				type="module"
				src="dashboard.js">
			</script>
		
		</body>

</html>
