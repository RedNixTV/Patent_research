<!DOCTYPE html>

<html>

	<head>
		<title>
			Classification Discovery Tool
		</title>
	</head>
	
		<body>
			<div id="histogramControls">
			
				<label>
					<input
						type="checkbox"
						id="showFullClasses"
						checked
					>
					Show Full Classes
				</label>
			
			</div>
		
			<div id="summary"></div>
			
			<button id="referencesTab">
				References
			</button>
			
			<button id="cpcTab">
				CPC Histogram
			</button>
			
			<button id="uspcTab">
				USPC Histogram
			</button>
			
			<div id="content"></div>
			
			<pre id="histogramOutput"></pre>
			
			<table id="patentTable">
			
				<thead>
					<tr>
						<th>#</th>
						<th>Patent</th>
						<th>Relevance</th>
					</tr>
				</thead>
			
				<tbody></tbody>
			
			</table>	
			<div
				id="editPatentDialog"
				style="
					display:none;
					position:fixed;
					top:50%;
					left:50%;
					transform:translate(-50%,-50%);
					background:white;
					border:1px solid #ccc;
					padding:20px;
					z-index:999999;
					width:600px;
				"
			>
			
				<h3>Edit Patent</h3>
			
				<label>Patent Number</label>
				<input
					id="editPatentNumber"
					style="width:100%;"
				>
			
				<br><br>
			
				<label>Title</label>
				<input
					id="editTitle"
					style="width:100%;"
				>
			
				<br><br>
			
				<label>Relevance</label>
			
				<select id="editRelevance">
			
					<option value="strong">
						Strong
					</option>
			
					<option value="partial">
						Partial
					</option>
			
					<option value="weak">
						Weak
					</option>
			
				</select>
			
				<br><br>
			
				<label>Assignee</label>
			
				<input
					id="editAssignee"
					style="width:100%;"
				>
			
				<br><br>
			
				<label>URL</label>
			
				<input
					id="editUrl"
					style="width:100%;"
					readonly
				>
			
				<br><br>
				<label>CPC</label>
				
				<textarea
					id="editCpc"
					style="
						width:100%;
						height:120px;
					"
					readonly
				></textarea>
				
				<br><br>
				
				<label>USPC</label>
				
				<textarea
					id="editUspc"
					style="
						width:100%;
						height:80px;
					"
					readonly
				></textarea>
				
				<br><br>
			
				<button id="savePatentChanges">
					Save Changes
				</button>
			
				<button id="deletePatentRecord">
					Delete Patent
				</button>
			
				<button id="cancelPatentEdit">
					Cancel
				</button>
			
			</div>	
		
			<script
				type="module"
				src="dashboard.js">
			</script>
		
		</body>

</html>
